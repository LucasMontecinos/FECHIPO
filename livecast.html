<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FECHIPO LiveCast</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A1628;--card:#11223B;--border:#1E3A5F;--text:#D4E1F0;--muted:#7A8FA6;--accent:#C41E3A;--blue:#1E5BA8;--gold:#D4A843;--green:#22c55e;--red:#ef4444}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
input,select,button{font-family:inherit;outline:none}
.os{font-family:'Oswald',sans-serif}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fade{animation:fadeIn .25s ease}
.pulse{animation:pulse 1.5s ease-in-out infinite}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px}
.inp{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;transition:border-color .2s}
.inp:focus{border-color:var(--accent)}.inp.ok{border-color:var(--green)}
.btn{padding:8px 16px;border-radius:6px;border:none;font-weight:600;font-size:12px;cursor:pointer;font-family:'Oswald',sans-serif;letter-spacing:1px;text-transform:uppercase;transition:all .15s}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-r{background:var(--accent);color:#fff}.btn-g{background:var(--green);color:#fff}.btn-b{background:var(--blue);color:#fff}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--muted)}.btn-o:hover{border-color:var(--accent);color:var(--text)}
.tab{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-weight:600;font-size:11px;cursor:pointer;font-family:'Oswald',sans-serif;letter-spacing:1px;text-transform:uppercase;transition:all .2s}
.tab.a{background:var(--accent);color:#fff;border-color:var(--accent)}.tab:hover:not(.a){border-color:var(--muted)}
@media(max-width:700px){.g2{grid-template-columns:1fr!important}}
</style>
</head>
<body>
<div id="R"></div>
<script>
const S={loaded:false,events:[],eventIdx:-1,athletes:[],view:'setup',flight:'A',lift:'sq',round:0,timer:60,timerOn:false,selId:-1,editId:-1,_focusId:null};
const LIFTS=['sq','bp','dl'],LN={sq:'SQUAT',bp:'BENCH PRESS',dl:'DEADLIFT'},LS={sq:'SQ',bp:'BP',dl:'DL'};
const LC={sq:'#3b82f6',bp:'#f59e0b',dl:'#ef4444'},FC={A:'#3b82f6',B:'#f59e0b',C:'#22c55e',D:'#a855f7',E:'#ec4899',F:'#06b6d4'};

function gl(t,bw,sex){if(!t||!bw||t<=0)return 0;const m=sex==='Hombre'||sex==='Masculino'||sex==='M';const a=m?1199.72839:610.32796,b=m?1025.18162:560.22205,c=m?0.00921:0.01289;const d=a-b*Math.exp(-c*bw);return d>0?Math.round(t*100/d*100)/100:0;}
function best(a,l){let b=0;for(const t of a.att[l])if(t.r==='good'&&t.w>b)b=t.w;return b;}
function total(a){const s=best(a,'sq'),b=best(a,'bp'),d=best(a,'dl');return(s&&b&&d)?s+b+d:0;}
function rankings(){return S.athletes.map(a=>({...a,total:total(a),gl:gl(total(a),a.bw,a.sex||a.sexo)})).filter(a=>a.total>0).sort((a,b)=>b.gl-a.gl);}
function liftOrder(){return S.athletes.filter(a=>!a.bombed&&a.flight===S.flight&&a.att[S.lift][S.round].r===null&&a.att[S.lift][S.round].w>0).sort((a,b)=>{const wa=a.att[S.lift][S.round].w,wb=b.att[S.lift][S.round].w;return wa!==wb?wa-wb:a.lot-b.lot;});}

const SK='fechipo_lc2';
function save(){try{localStorage.setItem(SK,JSON.stringify({eventIdx:S.eventIdx,athletes:S.athletes,view:S.view,flight:S.flight,lift:S.lift,round:S.round}));}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem(SK));if(d&&d.athletes?.length){Object.assign(S,d);return true;}}catch(e){}return false;}

let _tid=null;
function timerStart(){if(S.timerOn)return;S.timerOn=true;_tid=setInterval(()=>{S.timer--;if(S.timer<=0){S.timerOn=false;clearInterval(_tid);}render();},1000);}
function timerPause(){S.timerOn=false;clearInterval(_tid);}
function timerReset(){timerPause();S.timer=60;render();}

function selectEvent(i){S.eventIdx=i;const ev=S.events[i];S.athletes=ev.athletes.map((a,j)=>({...a,id:j,lot:j+1,bw:0,flight:'A',rackSQ:'',rackBP:'',bombed:false,att:{sq:[{w:0,r:null},{w:0,r:null},{w:0,r:null}],bp:[{w:0,r:null},{w:0,r:null},{w:0,r:null}],dl:[{w:0,r:null},{w:0,r:null},{w:0,r:null}]}}));S.view='athletes';S.flight='A';S.lift='sq';S.round=0;S.selId=-1;S.editId=-1;save();render();}
function upA(id,k,v){const a=S.athletes.find(x=>x.id===id);if(a)a[k]=v;save();}
function setAtt(id,l,r,w){const a=S.athletes.find(x=>x.id===id);if(a){a.att[l][r]={...a.att[l][r],w:parseFloat(w)||0};save();}}
function judge(id,l,r,res){const a=S.athletes.find(x=>x.id===id);if(!a)return;a.att[l][r].r=res;if(r<2&&res==='good'){const nw=a.att[l][r+1].w;if(!nw)a.att[l][r+1].w=a.att[l][r].w+2.5;}if(a.att[l].every(t=>t.r==='nolift'))a.bombed=true;timerReset();save();render();}
function newComp(){localStorage.removeItem(SK);S.eventIdx=-1;S.athletes=[];S.view='setup';S.selId=-1;S.editId=-1;render();}
function exportJSON(){const r=rankings();const blob=new Blob([JSON.stringify(r.map((a,i)=>({rank:i+1,nombre:a.nombre,rut:a.rut||'',sexo:a.sex||a.sexo||'',categoria:a.categoria||'',bw:a.bw,sq:best(a,'sq'),bp:best(a,'bp'),dl:best(a,'dl'),total:a.total,gl:a.gl,club:a.club||''})),null,2)],{type:'application/json'});const u=URL.createObjectURL(blob);const l=document.createElement('a');l.href=u;l.download='resultados_'+(S.events[S.eventIdx]?.short||'comp').replace(/\s/g,'_')+'.json';l.click();URL.revokeObjectURL(u);}

function render(){
  const el=document.getElementById('R');let h='';
  if(S.view!=='scoreboard'){
    h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:rgba(17,34,59,.95);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);flex-wrap:wrap;gap:6px">';
    h+='<div style="display:flex;align-items:center;gap:10px"><div class="os" style="font-size:20px;font-weight:700;letter-spacing:2px"><span style="color:var(--accent)">FECHIPO</span> <span style="font-weight:400;color:var(--muted)">LiveCast</span></div>';
    if(S.eventIdx>=0)h+='<span style="font-size:10px;color:var(--muted);background:var(--bg);padding:3px 8px;border-radius:12px">'+S.events[S.eventIdx]?.short+'</span>';
    h+='</div><div style="display:flex;gap:4px;flex-wrap:wrap">';
    if(S.eventIdx>=0){['athletes','competition','scoreboard','results'].forEach(v=>{const labels={athletes:'👥 Atletas',competition:'🏋 Competencia',scoreboard:'📺 Pantalla',results:'🏆 Resultados'};h+='<button class="tab '+(S.view===v?'a':'')+'" onclick="S.view=\''+v+'\';render()">'+labels[v]+'</button>';});h+='<button class="tab" onclick="newComp()">✕</button>';}
    h+='</div></div>';
  }
  if(S.view==='setup')h+=vSetup();else if(S.view==='athletes')h+=vAthletes();else if(S.view==='competition')h+=vComp();else if(S.view==='scoreboard')h+=vScore();else if(S.view==='results')h+=vResults();
  el.innerHTML=h;
  if(S._focusId){const inp=document.getElementById(S._focusId);if(inp){inp.focus();const len=inp.value.length;try{inp.setSelectionRange(len,len);}catch(e){}}S._focusId=null;}
}

function vSetup(){let h='<div class="fade" style="max-width:650px;margin:50px auto;padding:0 16px"><div style="text-align:center;margin-bottom:32px"><h1 class="os" style="font-size:clamp(26px,5vw,40px);letter-spacing:3px"><span style="color:var(--accent)">LIVE</span>CAST</h1><p style="color:var(--muted);font-size:13px;margin-top:6px">Sistema de Gestión de Competencia en Vivo</p><div style="width:50px;height:3px;background:linear-gradient(90deg,var(--accent),var(--gold));margin:10px auto;border-radius:2px"></div></div>';
if(!S.events.length)h+='<div class="card" style="text-align:center;padding:30px"><p style="color:var(--muted)">Cargando competencias...</p></div>';
S.events.forEach((ev,i)=>{h+='<div class="card" style="cursor:pointer;transition:border-color .2s,transform .15s" onclick="selectEvent('+i+')" onmouseover="this.style.borderColor=\'var(--accent)\';this.style.transform=\'translateX(4px)\'" onmouseout="this.style.borderColor=\'var(--border)\';this.style.transform=\'none\'"><div style="display:flex;justify-content:space-between;align-items:center"><div><div class="os" style="font-size:16px;font-weight:700">'+ev.name+'</div><p style="color:var(--muted);font-size:12px;margin-top:3px">'+ev.organizer+' · '+ev.location+' · '+ev.days+'</p></div><div style="text-align:center"><div style="background:var(--accent);color:#fff;padding:4px 14px;border-radius:20px;font-size:15px;font-weight:700;font-family:Oswald">'+ev.athletes.length+'</div><div style="font-size:9px;color:var(--muted);margin-top:2px">atletas</div></div></div></div>';});
return h+'</div>';}

function vAthletes(){
const flights=[...new Set(S.athletes.map(a=>a.flight))].sort();const ff=S.flight;const shown=S.athletes.filter(a=>a.flight===ff);
const weighed=S.athletes.filter(a=>a.bw>0).length;const ready=S.athletes.filter(a=>a.bw>0&&a.att.sq[0].w>0&&a.att.bp[0].w>0&&a.att.dl[0].w>0).length;
let h='<div class="fade" style="max-width:950px;margin:0 auto;padding:10px 16px">';
h+='<div style="display:flex;justify-content:space-between;align-items:center;margin:12px 0;flex-wrap:wrap;gap:8px"><div><h2 class="os" style="font-size:20px;letter-spacing:1px">ATLETAS & PESAJE</h2><p style="font-size:11px;color:var(--muted)">'+weighed+'/'+S.athletes.length+' pesados · '+ready+' listos</p></div><button class="btn btn-g" onclick="S.view=\'competition\';render()">🏋 Ir a Competencia →</button></div>';
h+='<div style="display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap">';
flights.forEach(f=>{h+='<button class="tab '+(ff===f?'a':'')+'" style="'+(ff===f?'background:'+(FC[f]||'var(--muted)')+';border-color:'+(FC[f]||'var(--muted)'):'border-color:'+(FC[f]||'var(--border)'))+'" onclick="S.flight=\''+f+'\';render()">Vuelo '+f+' ('+S.athletes.filter(a=>a.flight===f).length+')</button>';});
h+='</div>';

shown.forEach(a=>{
const exp=S.editId===a.id;const ok=a.bw>0&&a.att.sq[0].w>0&&a.att.bp[0].w>0&&a.att.dl[0].w>0;
h+='<div class="card" style="padding:0;border-left:3px solid '+(ok?'var(--green)':'var(--border)')+'">';
h+='<div onclick="S.editId='+(exp?-1:a.id)+';render()" style="display:grid;grid-template-columns:30px 1fr auto auto auto auto 20px;gap:6px;align-items:center;padding:10px 12px;cursor:pointer;font-size:13px">';
h+='<span class="os" style="color:var(--gold);font-weight:700;text-align:center">'+a.lot+'</span>';
h+='<div style="overflow:hidden"><div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+a.nombre+'</div><div style="font-size:10px;color:var(--muted)">'+(a.club||'')+'</div></div>';
h+='<span style="font-size:10px;color:var(--muted)">'+(a.categoria||'')+'</span>';
h+='<span style="background:'+(FC[a.flight]||'var(--muted)')+';color:#fff;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700;font-family:Oswald">'+a.flight+'</span>';
h+='<span class="os" style="font-size:13px;color:'+(a.bw>0?'var(--green)':'var(--muted)')+';min-width:50px;text-align:center">'+(a.bw>0?a.bw+'kg':'—')+'</span>';
h+='<span style="font-size:9px;color:var(--muted)">'+(a.att.sq[0].w>0?'SQ ':'')+(a.att.bp[0].w>0?'BP ':'')+(a.att.dl[0].w>0?'DL':'')+'</span>';
h+='<span style="color:var(--muted);font-size:14px;transition:transform .2s;transform:'+(exp?'rotate(90deg)':'none')+'">›</span></div>';

if(exp){
h+='<div style="padding:0 12px 14px;border-top:1px solid var(--border);padding-top:12px">';
h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px">';
// Flight
h+='<div><label style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px;font-family:Oswald">Vuelo</label>';
h+='<select class="inp" onchange="upA('+a.id+',\'flight\',this.value);render()">';
['A','B','C','D','E','F'].forEach(f=>{h+='<option '+(a.flight===f?'selected':'')+'>'+f+'</option>';});
h+='</select></div>';
// BW
var iid='inp_'+a.id+'_bw';
h+='<div><label style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px;font-family:Oswald">Peso Corporal (kg)</label>';
h+='<input id="'+iid+'" class="inp '+(a.bw>0?'ok':'')+'" type="number" step="0.1" value="'+(a.bw||'')+'" placeholder="kg" oninput="upA('+a.id+',\'bw\',parseFloat(this.value)||0)" onfocus="S._focusId=\''+iid+'\'"></div>';
// Rack SQ
iid='inp_'+a.id+'_rsq';
h+='<div><label style="font-size:9px;color:#3b82f6;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px;font-family:Oswald">Rack Squat</label>';
h+='<input id="'+iid+'" class="inp" type="text" value="'+(a.rackSQ||'')+'" placeholder="ej: 12-out" oninput="upA('+a.id+',\'rackSQ\',this.value)" onfocus="S._focusId=\''+iid+'\'"></div>';
// Rack BP
iid='inp_'+a.id+'_rbp';
h+='<div><label style="font-size:9px;color:#f59e0b;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px;font-family:Oswald">Rack Bench</label>';
h+='<input id="'+iid+'" class="inp" type="text" value="'+(a.rackBP||'')+'" placeholder="ej: 5" oninput="upA('+a.id+',\'rackBP\',this.value)" onfocus="S._focusId=\''+iid+'\'"></div>';
h+='</div>';
// Openers
h+='<div style="margin-top:10px"><label style="font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;font-family:Oswald;display:block;margin-bottom:6px">OPENERS</label><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">';
['sq','bp','dl'].forEach(l=>{
iid='inp_'+a.id+'_op_'+l;
h+='<div><label style="font-size:9px;color:'+LC[l]+';font-family:Oswald;letter-spacing:.5px;display:block;margin-bottom:2px">'+LS[l]+' (kg)</label>';
h+='<input id="'+iid+'" class="inp '+(a.att[l][0].w>0?'ok':'')+'" type="number" step="2.5" value="'+(a.att[l][0].w||'')+'" placeholder="0" style="border-color:'+(a.att[l][0].w>0?LC[l]:'var(--border)')+';font-weight:700;text-align:center;font-family:Oswald" oninput="setAtt('+a.id+',\''+l+'\',0,this.value)" onfocus="S._focusId=\''+iid+'\'"></div>';
});
h+='</div></div></div>';
}
h+='</div>';
});
return h+'</div>';}

function vComp(){
const flights=[...new Set(S.athletes.map(a=>a.flight))].sort();
const fa=S.athletes.filter(a=>a.flight===S.flight&&!a.bombed);
const order=liftOrder();const cur=order[0]||null;const rk=rankings();
const sel=S.selId>=0?S.athletes.find(x=>x.id===S.selId):cur;
const s=sel||cur;
const ri=s?(S.lift==='sq'?s.rackSQ:S.lift==='bp'?s.rackBP:''):'';

let h='<div class="fade" style="display:grid;grid-template-columns:1fr 320px;gap:12px;padding:10px 16px;max-width:1200px;margin:0 auto" class="g2"><div>';
// Flights
h+='<div style="display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap">';
flights.forEach(f=>{h+='<button class="tab '+(S.flight===f?'a':'')+'" style="'+(S.flight===f?'background:'+(FC[f]||'var(--muted)')+';border-color:'+(FC[f]||'var(--muted)'):'border-color:'+(FC[f]||'var(--border)'))+'" onclick="S.flight=\''+f+'\';S.selId=-1;render()">Vuelo '+f+'</button>';});
h+='</div>';
// Lifts
h+='<div style="display:flex;gap:4px;margin-bottom:8px">';
LIFTS.forEach(l=>{h+='<button class="os" onclick="S.lift=\''+l+'\';S.round=0;S.selId=-1;render()" style="flex:1;padding:8px;border-radius:6px;border:2px solid '+(S.lift===l?LC[l]:'var(--border)')+';background:'+(S.lift===l?LC[l]+'20':'transparent')+';color:'+(S.lift===l?LC[l]:'var(--muted)')+';font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer">'+LN[l]+'</button>';});
h+='</div>';
// Rounds
h+='<div style="display:flex;gap:4px;margin-bottom:10px">';
[0,1,2].forEach(r=>{h+='<button class="os" onclick="S.round='+r+';S.selId=-1;render()" style="flex:1;padding:6px;border-radius:5px;border:1px solid '+(S.round===r?'var(--gold)':'var(--border)')+';background:'+(S.round===r?'rgba(212,168,67,.12)':'transparent')+';color:'+(S.round===r?'var(--gold)':'var(--muted)')+';font-size:11px;font-weight:600;letter-spacing:1px;cursor:pointer">INTENTO '+(r+1)+'</button>';});
h+='</div>';
// Timer
h+='<div class="card" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px"><span class="os '+(S.timerOn&&S.timer<=10?'pulse':'')+'" style="font-size:32px;font-weight:700;color:'+(S.timer<=10?'var(--red)':S.timer<=30?'var(--gold)':'var(--green)')+'">'+Math.floor(S.timer/60)+':'+String(S.timer%60).padStart(2,'0')+'</span><div style="display:flex;gap:4px"><button class="btn btn-g" onclick="timerStart()" '+(S.timerOn?'disabled':'')+' style="padding:6px 10px">▶</button><button class="btn" style="background:var(--gold);color:#fff;padding:6px 10px" onclick="timerPause()">⏸</button><button class="btn btn-o" onclick="timerReset()" style="padding:6px 10px">↺</button></div></div>';

// Current lifter
if(s){
h+='<div class="card" style="border-left:4px solid '+LC[S.lift]+'">';
h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div><div class="os" style="font-size:18px;font-weight:700">'+s.nombre+'</div><div style="font-size:11px;color:var(--muted)">'+(s.club||'')+' · Lot #'+s.lot+' · '+s.bw+'kg</div></div>';
h+='<div style="display:flex;align-items:center;gap:6px">';
if(ri)h+='<span style="background:var(--bg);border:1px solid var(--border);padding:3px 8px;border-radius:5px;font-size:10px">🔧 '+ri+'</span>';
h+='<span style="background:'+LC[S.lift]+';color:#fff;padding:3px 10px;border-radius:5px;font-family:Oswald;font-weight:700;font-size:12px">'+LS[S.lift]+(S.round+1)+'</span></div></div>';
// Weight
var wid='inp_comp_w';
h+='<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px"><input id="'+wid+'" class="inp" type="number" step="2.5" value="'+(s.att[S.lift][S.round].w||'')+'" style="flex:1;padding:10px;font-size:20px;font-weight:700;font-family:Oswald;text-align:center;letter-spacing:2px;border-color:'+LC[S.lift]+'" oninput="setAtt('+s.id+',\''+S.lift+'\','+S.round+',this.value)" onfocus="S._focusId=\''+wid+'\'"><span class="os" style="color:var(--muted);font-size:14px">KG</span></div>';
// Judge
h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><button onclick="judge('+s.id+',\''+S.lift+'\','+S.round+',\'good\')" style="padding:14px;border-radius:8px;border:3px solid var(--green);background:rgba(34,197,94,.08);color:var(--green);font-size:16px;font-weight:700;font-family:Oswald;letter-spacing:2px;cursor:pointer">✓ GOOD LIFT</button><button onclick="judge('+s.id+',\''+S.lift+'\','+S.round+',\'nolift\')" style="padding:14px;border-radius:8px;border:3px solid var(--red);background:rgba(239,68,68,.08);color:var(--red);font-size:16px;font-weight:700;font-family:Oswald;letter-spacing:2px;cursor:pointer">✗ NO LIFT</button></div>';
// Attempt display
h+='<div style="display:flex;gap:5px;margin-top:10px;justify-content:center">';
LIFTS.forEach(l=>{s.att[l].forEach((t,j)=>{const bg=t.r==='good'?'rgba(34,197,94,.12)':t.r==='nolift'?'rgba(239,68,68,.12)':'transparent';const bc=t.r==='good'?'rgba(34,197,94,.4)':t.r==='nolift'?'rgba(239,68,68,.4)':'var(--border)';const tc=t.r==='good'?'var(--green)':t.r==='nolift'?'var(--red)':'var(--muted)';h+='<div style="text-align:center;padding:3px 5px;border:1px solid '+bc+';border-radius:4px;background:'+bg+';min-width:38px;cursor:pointer" onclick="S.lift=\''+l+'\';S.round='+j+';S.selId='+s.id+';render()"><div style="font-size:7px;color:var(--muted);font-family:Oswald">'+LS[l]+(j+1)+'</div><div class="os" style="font-size:11px;font-weight:700;color:'+tc+';'+(t.r==='nolift'?'text-decoration:line-through':'')+'">'+(t.w||'—')+'</div></div>';});});
h+='</div></div>';
} else {
h+='<div class="card" style="text-align:center;padding:20px"><span class="os" style="color:var(--gold);font-size:15px;letter-spacing:2px">RONDA COMPLETADA</span></div>';
}

// Queue
h+='<div class="card"><h3 class="os" style="font-size:12px;letter-spacing:1px;margin-bottom:8px;color:var(--muted)">ORDEN DE LEVANTAMIENTO</h3>';
if(!order.length)h+='<p style="font-size:11px;color:var(--muted);text-align:center;padding:8px">Sin pendientes</p>';
order.forEach((a,i)=>{const isSel=(S.selId>=0?S.selId:cur?.id)===a.id;const ari=S.lift==='sq'?a.rackSQ:S.lift==='bp'?a.rackBP:'';
h+='<div onclick="S.selId='+a.id+';render()" style="display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border-radius:5px;margin-bottom:3px;cursor:pointer;background:'+(isSel?LC[S.lift]+'12':'transparent')+';border:1px solid '+(isSel?LC[S.lift]+'30':'transparent')+'"><div style="display:flex;align-items:center;gap:8px"><span class="os" style="color:var(--gold);font-weight:700;width:20px;text-align:center">'+(i+1)+'</span><span style="font-size:12px;font-weight:600">'+a.nombre+'</span></div><div style="display:flex;align-items:center;gap:6px">'+(ari?'<span style="font-size:8px;color:var(--muted);background:var(--bg);padding:1px 5px;border-radius:3px">R:'+ari+'</span>':'')+'<span class="os" style="color:'+LC[S.lift]+';font-weight:700;font-size:14px">'+a.att[S.lift][S.round].w+' kg</span></div></div>';});
h+='</div>';

// Summary table
h+='<div class="card"><h3 class="os" style="font-size:12px;letter-spacing:1px;margin-bottom:8px;color:var(--muted)">'+LN[S.lift]+' — VUELO '+S.flight+'</h3>';
fa.forEach(a=>{h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(30,58,95,.15);font-size:11px"><span style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+a.nombre+'</span><div style="display:flex;gap:3px">'+a.att[S.lift].map((t,j)=>{const bg=t.r==='good'?'rgba(34,197,94,.12)':t.r==='nolift'?'rgba(239,68,68,.12)':'transparent';const bc=t.r==='good'?'rgba(34,197,94,.3)':t.r==='nolift'?'rgba(239,68,68,.3)':'var(--border)';const tc=t.r==='good'?'var(--green)':t.r==='nolift'?'var(--red)':'var(--muted)';return'<span style="width:44px;text-align:center;padding:1px 3px;border-radius:3px;font-size:9px;font-weight:600;font-family:Oswald;background:'+bg+';color:'+tc+';border:1px solid '+bc+';'+(t.r==='nolift'?'text-decoration:line-through':'')+'">'+(t.w||'—')+'</span>';}).join('')+'</div></div>';});
h+='</div></div>';

// Right: Rankings
h+='<div><div class="card" style="position:sticky;top:56px"><h3 class="os" style="font-size:12px;letter-spacing:1px;margin-bottom:10px;color:var(--gold)">RANKING GL POINTS</h3>';
if(!rk.length)h+='<p style="font-size:11px;color:var(--muted);text-align:center;padding:16px">Sin totales aún</p>';
rk.forEach((a,i)=>{h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 8px;border-bottom:1px solid rgba(30,58,95,.25)"><div style="display:flex;align-items:center;gap:6px"><span class="os" style="color:'+(i<3?'var(--gold)':'var(--muted)')+';font-weight:700;font-size:15px;width:22px">'+(i+1)+'</span><div><div style="font-weight:600;font-size:12px">'+a.nombre+'</div><div style="font-size:9px;color:var(--muted)">'+a.bw+'kg · SQ'+best(a,'sq')+' BP'+best(a,'bp')+' DL'+best(a,'dl')+'</div></div></div><div style="text-align:right"><div class="os" style="font-size:16px;font-weight:700;color:var(--gold)">'+a.gl+'</div><div style="font-size:9px;color:var(--muted)">'+a.total+'kg</div></div></div>';});
h+='</div></div></div>';
return h;}

function vScore(){
const order=liftOrder();const cur=order[0];const next=order[1];const rk=rankings();
const ri=cur?(S.lift==='sq'?cur.rackSQ:S.lift==='bp'?cur.rackBP:''):'';
let h='<div style="min-height:100vh"><div style="display:flex;justify-content:space-between;align-items:center;padding:10px 24px;background:linear-gradient(90deg,var(--accent),#8B1525);color:#fff"><div class="os" style="font-size:22px;font-weight:700;letter-spacing:3px">FECHIPO LIVECAST</div><div class="os" style="font-size:14px;letter-spacing:1px">'+(S.events[S.eventIdx]?.short||'')+'</div><div style="display:flex;align-items:center;gap:12px"><span class="os" style="font-size:13px;background:'+LC[S.lift]+';padding:4px 14px;border-radius:5px;font-weight:700;letter-spacing:2px">VUELO '+S.flight+' — '+LN[S.lift]+' — INT '+(S.round+1)+'</span><button onclick="S.view=\'competition\';render()" style="background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-family:Oswald">⚙ CONTROL</button></div></div>';
h+='<div style="display:grid;grid-template-columns:1fr 360px;min-height:calc(100vh - 50px)">';
h+='<div style="display:flex;flex-direction:column;justify-content:center;align-items:center;padding:30px">';
if(cur){
h+='<div class="os '+(S.timerOn&&S.timer<=10?'pulse':'')+'" style="font-size:64px;font-weight:700;color:'+(S.timer<=10?'var(--red)':S.timer<=30?'var(--gold)':'var(--green)')+';margin-bottom:16px;opacity:'+(S.timerOn?1:.3)+'">'+Math.floor(S.timer/60)+':'+String(S.timer%60).padStart(2,'0')+'</div>';
h+='<div class="os" style="font-size:clamp(28px,5vw,48px);font-weight:700;letter-spacing:2px;text-align:center">'+cur.nombre+'</div>';
h+='<div style="color:var(--muted);font-size:15px;margin:8px 0 20px">'+(cur.club||'')+' · '+cur.bw+'kg · Lot #'+cur.lot+(ri?' · 🔧 Rack: '+ri:'')+'</div>';
h+='<div class="os" style="font-size:72px;font-weight:700;color:'+LC[S.lift]+';letter-spacing:4px">'+(cur.att[S.lift][S.round].w||'—')+' <span style="font-size:32px;color:var(--muted)">KG</span></div>';
h+='<div style="display:flex;gap:14px;margin-top:24px">';
cur.att[S.lift].forEach((t,j)=>{h+='<div style="text-align:center;opacity:'+(j===S.round?1:.4)+'"><div style="font-size:9px;color:var(--muted);font-family:Oswald;letter-spacing:1px">INT '+(j+1)+'</div><div class="os" style="font-size:24px;font-weight:700;color:'+(t.r==='good'?'var(--green)':t.r==='nolift'?'var(--red)':'var(--muted)')+';'+(t.r==='nolift'?'text-decoration:line-through':'')+'">'+(t.w||'—')+'</div></div>';});
h+='</div>';
if(next)h+='<div style="margin-top:30px;color:var(--muted);font-size:12px">Siguiente: <strong style="color:var(--text)">'+next.nombre+'</strong> — '+next.att[S.lift][S.round].w+'kg'+((S.lift==='sq'&&next.rackSQ)||(S.lift==='bp'&&next.rackBP)?' · Rack: '+(S.lift==='sq'?next.rackSQ:next.rackBP):'')+'</div>';
} else {h+='<div class="os" style="font-size:24px;color:var(--gold);letter-spacing:2px">RONDA COMPLETADA</div>';}
h+='</div>';
h+='<div style="background:rgba(17,34,59,.8);border-left:1px solid var(--border);padding:16px;overflow-y:auto"><h3 class="os" style="font-size:14px;letter-spacing:2px;color:var(--gold);margin-bottom:10px;text-align:center">RANKING GL POINTS</h3>';
rk.forEach((a,i)=>{h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-bottom:1px solid rgba(30,58,95,.25);background:'+(cur&&a.id===cur.id?LC[S.lift]+'12':'transparent')+';border-radius:3px"><div style="display:flex;align-items:center;gap:8px"><span class="os" style="color:'+(i<3?'var(--gold)':'var(--muted)')+';font-weight:700;font-size:16px;width:24px">'+(i+1)+'</span><div><div style="font-weight:600;font-size:13px">'+a.nombre+'</div><div style="font-size:10px;color:var(--muted)">SQ '+best(a,'sq')+' · BP '+best(a,'bp')+' · DL '+best(a,'dl')+'</div></div></div><div style="text-align:right"><div class="os" style="font-size:18px;font-weight:700;color:var(--gold)">'+a.gl+'</div><div style="font-size:10px;color:var(--muted)">'+a.total+'kg</div></div></div>';});
if(!rk.length)h+='<p style="text-align:center;padding:30px;color:var(--muted);font-size:12px">Sin totales</p>';
h+='</div></div></div>';return h;}

function vResults(){
const rk=rankings();const bombed=S.athletes.filter(a=>a.bombed);
let h='<div class="fade" style="max-width:1000px;margin:0 auto;padding:10px 16px"><div style="display:flex;justify-content:space-between;align-items:center;margin:12px 0;flex-wrap:wrap;gap:8px"><div><h2 class="os" style="font-size:22px;letter-spacing:2px">RESULTADOS FINALES</h2><p style="font-size:12px;color:var(--muted)">'+(S.events[S.eventIdx]?.name||'')+'</p></div><button class="btn btn-g" onclick="exportJSON()">📥 Exportar JSON</button></div>';
h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">';
[['Atletas',S.athletes.length,'var(--blue)'],['Clasificados',rk.length,'var(--green)'],['Bomb Out',bombed.length,'var(--red)'],['Mejor GL',rk[0]?.gl||'—','var(--gold)']].forEach(([l,v,c])=>{h+='<div class="card" style="text-align:center;padding:12px"><div class="os" style="font-size:24px;font-weight:700;color:'+c+'">'+v+'</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px">'+l+'</div></div>';});
h+='</div>';
h+='<div class="card" style="padding:0;overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="border-bottom:2px solid var(--border)">';
['#','Atleta','BW','Cat.','SQ','BP','DL','Total','GL'].forEach(x=>{h+='<th class="os" style="padding:8px 6px;text-align:'+(x==='Atleta'?'left':'center')+';color:var(--muted);font-size:10px;letter-spacing:1px">'+x+'</th>';});
h+='</tr></thead><tbody>';
rk.forEach((a,i)=>{h+='<tr style="border-bottom:1px solid rgba(30,58,95,.25)"><td class="os" style="padding:8px 6px;text-align:center;color:var(--gold);font-weight:700;font-size:15px">'+(i+1)+'</td><td style="padding:8px 6px"><div style="font-weight:600">'+a.nombre+'</div><div style="font-size:9px;color:var(--muted)">'+(a.club||'')+'</div></td><td style="padding:8px 6px;text-align:center">'+a.bw+'</td><td style="padding:8px 6px;text-align:center;font-size:10px">'+(a.categoria||'')+'</td><td class="os" style="padding:8px 6px;text-align:center;font-weight:700;color:#3b82f6">'+(best(a,'sq')||'—')+'</td><td class="os" style="padding:8px 6px;text-align:center;font-weight:700;color:#f59e0b">'+(best(a,'bp')||'—')+'</td><td class="os" style="padding:8px 6px;text-align:center;font-weight:700;color:#ef4444">'+(best(a,'dl')||'—')+'</td><td class="os" style="padding:8px 6px;text-align:center;font-weight:700;font-size:15px">'+a.total+'</td><td class="os" style="padding:8px 6px;text-align:center;font-weight:700;font-size:15px;color:var(--gold)">'+a.gl+'</td></tr>';});
h+='</tbody></table></div>';
if(bombed.length){h+='<div class="card"><h3 class="os" style="font-size:12px;color:var(--red);letter-spacing:1px;margin-bottom:6px">BOMB OUT</h3>';bombed.forEach(a=>{h+='<div style="padding:4px 0;border-bottom:1px solid rgba(30,58,95,.15);font-size:12px;color:var(--muted)">'+a.nombre+' — '+(a.club||'')+'</div>';});h+='</div>';}
return h+'</div>';}

fetch('nominas.json').then(r=>r.json()).then(n=>{S.events=n.events||[];S.loaded=true;if(!load())render();else render();}).catch(()=>{S.loaded=true;if(!load())render();else render();});
</script>
</body>
</html>
